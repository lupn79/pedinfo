<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒童發展聯合評估 基本資料表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F1;
    --card:#FFFFFF;
    --primary:#1F6F78;
    --primary-dark:#154D53;
    --accent:#E8935B;
    --text:#2B2B29;
    --text-muted:#767268;
    --border:#E7E1D5;
    --danger:#C85C4A;
    --radius:14px;
    --shadow:0 2px 10px rgba(43,43,41,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
  }
  #topbar{
    position:sticky; top:0; z-index:20;
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:14px 20px;
  }
  #topbar .title{font-weight:700; font-size:15px; color:var(--primary-dark);}
  #topbar .sub{font-size:12px; color:var(--text-muted); margin-top:2px;}
  #progress-track{
    margin-top:10px; height:6px; background:var(--border); border-radius:99px; overflow:hidden;
  }
  #progress-bar{
    height:100%; width:0%; background:linear-gradient(90deg,var(--primary),var(--accent));
    transition:width .3s ease;
  }
  #step-counter{font-size:12px; color:var(--text-muted); margin-top:6px;}

  main{max-width:720px; margin:0 auto; padding:24px 16px 120px;}

  .step{display:none;}
  .step.active{display:block; animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:22px 20px;
    margin-bottom:16px;
  }
  .step-title{font-size:19px; font-weight:700; color:var(--primary-dark); margin:0 0 4px;}
  .step-desc{font-size:13px; color:var(--text-muted); margin:0 0 18px;}
  .step-desc.must-check{color:var(--danger); font-weight:700; font-size:14px;}
  .subcard-title .must-check{color:var(--danger); font-weight:700;}
  .field.field-error{outline:2px solid var(--danger); outline-offset:3px; border-radius:10px;}

  .field{margin-bottom:18px;}
  .field:last-child{margin-bottom:0;}
  .field-label{font-weight:600; font-size:14.5px; margin-bottom:8px; display:block; color:var(--text);}
  .field-hint{font-size:12px; color:var(--text-muted); font-weight:400; margin-left:4px;}
  .req{color:var(--danger); font-weight:700;}

  input[type=text], input[type=number], input[type=date], textarea, select{
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px;
    font-family:inherit; font-size:14.5px; background:#FFFDFB; color:var(--text);
  }
  input[type=text]:focus, input[type=number]:focus, input[type=date]:focus, textarea:focus, select:focus{
    outline:2px solid var(--primary); outline-offset:1px; border-color:var(--primary);
  }
  textarea{resize:vertical; min-height:70px;}

  .radio-row, .checkbox-row{display:flex; flex-wrap:wrap; gap:8px;}
  .opt{
    display:flex; align-items:center; gap:6px;
    border:1px solid var(--border); border-radius:10px; padding:8px 12px;
    font-size:14px; cursor:pointer; background:#FFFDFB; transition:.15s;
  }
  .opt:has(input:checked){border-color:var(--primary); background:#EAF3F2; color:var(--primary-dark); font-weight:600;}
  .opt input{accent-color:var(--primary); margin:0;}
  .sub-input{width:120px !important; margin-left:4px; padding:5px 8px !important; font-size:13px !important;}
  .sub-input.wide{width:200px !important;}

  .inline-fields{display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
  .inline-fields .mini{flex:1; min-width:110px;}
  .row-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .row-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}
  @media (max-width:520px){ .row-2, .row-3{grid-template-columns:1fr;} }

  .subcard{
    border:1px dashed var(--border); border-radius:12px; padding:14px; margin-top:10px; background:#FCFAF6;
  }
  .subcard-title{font-weight:600; font-size:13.5px; color:var(--primary-dark); margin-bottom:10px;}

  .scale-header{display:flex; gap:10px; font-size:11px; color:var(--text-muted); margin-bottom:6px;}
  .scale-header .scale-header-spacer{flex:1;}
  .scale-header span{width:34px; text-align:center; line-height:1.3;}
  .scale-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border);}
  .scale-row:last-child{border-bottom:none;}
  .scale-label{font-size:13.5px; flex:1;}
  .scale-options{display:flex; gap:10px;}
  .scale-opt{width:34px; display:flex; flex-direction:column; align-items:center; font-size:11px; color:var(--text-muted); cursor:pointer;}
  .scale-opt input{accent-color:var(--primary); margin:0;}

  .concern-cat{font-weight:700; color:var(--primary-dark); font-size:13px; margin:16px 0 6px; text-transform:none;}
  .concern-cat:first-child{margin-top:0;}

  .notice{
    background:#FBF1E6; border:1px solid #EFD9B8; border-radius:12px; padding:14px 16px;
    font-size:13px; color:#7A5A2A; margin-bottom:18px;
  }
  .legal{font-size:13px; color:var(--text-muted); background:#F4F1EA; border-radius:12px; padding:14px 16px; margin-bottom:16px;}

  #navbar{
    position:fixed; bottom:0; left:0; right:0; background:var(--card);
    border-top:1px solid var(--border); padding:12px 16px; z-index:20;
  }
  #navbar-inner{max-width:720px; margin:0 auto; display:flex; justify-content:space-between; gap:10px;}
  button{
    font-family:inherit; font-size:15px; font-weight:600; border-radius:10px; padding:12px 22px;
    border:none; cursor:pointer; transition:.15s;
  }
  #btn-prev{background:#F0EDE6; color:var(--text);}
  #btn-prev:hover{background:#E7E1D5;}
  #btn-next, #btn-submit{background:var(--primary); color:#fff;}
  #btn-next:hover, #btn-submit:hover{background:var(--primary-dark);}
  #btn-prev:disabled{visibility:hidden;}

  .intro-hero{text-align:center; padding:8px 4px 4px;}
  .intro-hero h1{font-size:22px; color:var(--primary-dark); margin-bottom:6px;}
  .intro-hero p{color:var(--text-muted); font-size:14px;}
  .intro-list{margin:18px 0; padding:0; list-style:none;}
  .intro-list li{display:flex; gap:10px; padding:8px 0; font-size:14px; align-items:flex-start;}
  .intro-list .dot{width:22px; height:22px; border-radius:50%; background:var(--primary); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;}

  #done-screen{text-align:center; padding:40px 20px;}
  #done-screen .check{font-size:52px; margin-bottom:16px;}
  #done-screen h2{color:var(--primary-dark);}

  #dev-banner{
    background:#FDECEC; color:#8A2C22; font-size:12.5px; text-align:center; padding:8px; border-bottom:1px solid #F3C9C2;
  }
</style>
</head>
<body>

<div id="dev-banner">⚠ 尚未設定 Google Apps Script 回傳網址，目前送出的資料不會被儲存。請在 index.html 檔案開頭的 GAS_WEB_APP_URL 填入您部署後的網址。</div>

<div id="topbar">
  <div class="title">臺北醫學大學附設醫院 · 兒童發展聯合評估 基本資料表</div>
  <div class="sub" id="section-title-sub">請依實際狀況填寫，填寫過程資料不會外流</div>
  <div id="progress-track"><div id="progress-bar"></div></div>
  <div id="step-counter"></div>
</div>

<main>
  <form id="mainForm">
    <div id="steps"></div>
  </form>
  <div id="done-screen" style="display:none;">
    <div class="check">✅</div>
    <h2>感謝您完成填寫</h2>
    <p style="color:var(--text-muted);">您的資料已送出，將由職能治療師於評估前先行閱覽，<br>若填寫過程中有任何問題，歡迎於評估當天告訴我們。</p>
  </div>
</main>

<div id="navbar">
  <div id="navbar-inner">
    <button type="button" id="btn-prev">上一步</button>
    <button type="button" id="btn-next">下一步</button>
    <button type="button" id="btn-submit" style="display:none;">送出表單</button>
  </div>
</div>

<script>
/* =========================================================
   設定區：部署 Google Apps Script Web App 後，將網址貼在下面
   （若尚未設定，表單仍可測試填寫與換頁，僅送出時不會真正送達）
   ========================================================= */
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNW6DVfgdteZ8tirAsRqOwXkX6Dxuulpvf8kI07BjR3c34XqI-g7dv7_JNTegnJCDbkg/exec";

/* =========================================================
   輔助函式：產生表單元件的 HTML
   ========================================================= */
function esc(s){ return String(s).replace(/"/g,'&quot;'); }

function opt(label, extra){ return {label, extra}; }
// extra = {name, type, placeholder, width}

function renderExtra(extra){
  if(!extra || !extra.name) return '';
  const w = extra.width==='wide' ? 'sub-input wide' : 'sub-input';
  return `<input type="${extra.type||'text'}" name="${extra.name}" placeholder="${esc(extra.placeholder||'')}" class="${w}">`;
}

function radioGroup(name, title, options, opts={}){
  let html = `<div class="field"><span class="field-label">${title}${opts.required?' <span class="req">*</span>':''}${opts.hint?` <span class="field-hint">${opts.hint}</span>`:''}</span><div class="radio-row">`;
  options.forEach((o,i)=>{
    const label = typeof o==='string' ? o : o.label;
    const extra = typeof o==='object' ? o.extra : null;
    html += `<label class="opt"><input type="radio" name="${name}" value="${esc(label)}" ${opts.required?'required':''}>${label}${renderExtra(extra)}</label>`;
  });
  html += `</div></div>`;
  return html;
}

function checkboxGroup(name, title, options, opts={}){
  const reqAttr = opts.required ? ` data-required-group="${name}"` : '';
  let html = `<div class="field"${reqAttr}><span class="field-label">${title}${opts.required?' <span class="req">*</span>':''}${opts.hint?` <span class="field-hint">${opts.hint}</span>`:''}</span><div class="checkbox-row">`;
  options.forEach((o)=>{
    const label = typeof o==='string' ? o : o.label;
    const extra = typeof o==='object' ? o.extra : null;
    html += `<label class="opt"><input type="checkbox" name="${name}" value="${esc(label)}">${label}${renderExtra(extra)}</label>`;
  });
  html += `</div></div>`;
  return html;
}

function textField(name, title, opts={}){
  const type = opts.type||'text';
  return `<div class="field"><label class="field-label" for="${name}">${title}${opts.required?' <span class="req">*</span>':''}</label>
    <input type="${type}" id="${name}" name="${name}" placeholder="${esc(opts.placeholder||'')}" ${opts.required?'required':''}></div>`;
}

function textareaField(name, title, opts={}){
  return `<div class="field"><label class="field-label" for="${name}">${title}</label>
    <textarea id="${name}" name="${name}" rows="${opts.rows||3}" placeholder="${esc(opts.placeholder||'')}"></textarea></div>`;
}

function scaleBlock(title, items, scaleLabels, opts={}){
  let html = `<div class="field"><span class="field-label">${title}${opts.required?' <span class="req">*</span>':''}</span>`;
  html += `<div class="scale-header"><span class="scale-header-spacer"></span>` + scaleLabels.map(s=>`<span>${s.short}</span>`).join('') + `</div>`;
  items.forEach(it=>{
    html += `<div class="scale-row"><div class="scale-label">${it.label}</div><div class="scale-options">`;
    scaleLabels.forEach(s=>{
      html += `<label class="scale-opt"><input type="radio" name="${it.name}" value="${s.value}" ${opts.required?'required':''}><span>${s.value}</span></label>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function therapyDetailBlock(prefix, label){
  return `<div class="subcard">
    <div class="subcard-title">${label}</div>
    <div class="row-2">
      <div class="field"><label class="field-label" for="therapy_${prefix}_start_age">開始接受療育之年齡</label><input type="text" id="therapy_${prefix}_start_age" name="therapy_${prefix}_start_age" placeholder="歲/個月"></div>
      <div class="field"><label class="field-label" for="therapy_${prefix}_duration">持續療育多久</label><input type="text" id="therapy_${prefix}_duration" name="therapy_${prefix}_duration" placeholder="年/月"></div>
    </div>
    <div class="row-2">
      <div class="field"><label class="field-label" for="therapy_${prefix}_location">目前療育醫院/診所</label><input type="text" id="therapy_${prefix}_location" name="therapy_${prefix}_location"></div>
      <div class="field"><label class="field-label" for="therapy_${prefix}_frequency">一週次數</label><input type="number" id="therapy_${prefix}_frequency" name="therapy_${prefix}_frequency"></div>
    </div>
  </div>`;
}

/* =========================================================
   各步驟內容
   ========================================================= */
const steps = [];

// ---------- Step 0：說明頁 ----------
steps.push({
  title: "填寫說明",
  desc: "",
  html: `
  <div class="card">
    <div class="intro-hero">
      <h1>兒童發展聯合評估<br>基本資料表</h1>
      <p>臺北醫學大學附設醫院 兒童聯合評估發展中心</p>
    </div>
    <ul class="intro-list">
      <li><span class="dot">1</span>請由家長（建議與評估當天陪同孩子的家長為同一人）填寫，約需 15–20 分鐘。</li>
      <li><span class="dot">2</span>內容分成數個小節，可以分次填寫、隨時返回上一步修改。</li>
      <li><span class="dot">3</span>若家中有 2 名以上孩子需要評估，請每位孩子分別填寫一份表單。</li>
      <li><span class="dot">4</span>本資料僅供評估團隊了解孩子狀況使用，將於評估當天由治療師參考。</li>
    </ul>
  </div>`
});

// ---------- Step 1：填表人基本資料 ----------
steps.push({
  title: "填表人基本資料",
  desc: "您詳細的填寫，有助於我們對孩子的瞭解與評估的進行",
  html: `
  <div class="card">
    ${textField('filler_name','填表人姓名',{required:true})}
    ${radioGroup('filler_gender','您的性別',['男','女'])}
    ${radioGroup('filler_relation','您與個案關係',['父親','母親','祖父','祖母','外祖父','外祖母', opt('其它',{name:'filler_relation_other',type:'text',placeholder:'請說明'})])}
    ${radioGroup('filler_age_range','您的年齡',['20歲以下','21-30歲','30-40歲','41-50歲','50歲以上'])}
    <div class="field">
      <span class="field-label">孩子的戶籍地區</span>
      <div class="inline-fields">
        <input type="text" class="mini" name="child_reg_city" placeholder="縣/市">
        <input type="text" class="mini" name="child_reg_district" placeholder="區">
        <input type="text" class="mini" name="child_reg_other" placeholder="其它（若無上述可填寫）">
      </div>
    </div>
    ${radioGroup('filler_education','您的教育程度',['不識字','國小','初中','國中','高中','高職','專科','大學','研究所'])}
  </div>`
});

// ---------- Step 2：父母資訊 + 經濟 + 期待 ----------
function parentBlock(prefix, label){
  return `
  <div class="subcard">
    <div class="subcard-title">${label}</div>
    <div class="row-3">
      <div class="field"><label class="field-label">年齡</label><input type="number" name="${prefix}_age" placeholder="歲"></div>
      <div class="field"><label class="field-label">工作</label><input type="text" name="${prefix}_job"></div>
      <div class="field"><label class="field-label">住所</label>
        <div class="radio-row">
          <label class="opt"><input type="radio" name="${prefix}_residence" value="台灣">台灣</label>
          <label class="opt"><input type="radio" name="${prefix}_residence" value="大陸">大陸</label>
          <label class="opt"><input type="radio" name="${prefix}_residence" value="其它">其它${renderExtra({name:prefix+'_residence_other',type:'text'})}</label>
        </div>
      </div>
    </div>
    ${checkboxGroup(prefix+'_time_with_child','回家與孩子相處時間',['每日晚飯前','每日晚飯後','假日', opt('其他',{name:prefix+'_time_other',type:'text',placeholder:'請說明'})])}
  </div>`;
}
steps.push({
  title: "父母資訊 · 經濟狀況 · 期待",
  desc: "",
  html: `
  <div class="card">
    ${parentBlock('father','父親')}
    ${parentBlock('mother','母親')}
  </div>
  <div class="card">
    ${checkboxGroup('income_source','經濟來源',['父','母','內/外祖父母', opt('政府補助',{name:'income_gov_amount',type:'number',placeholder:'元/月'}), opt('其他',{name:'income_source_other',type:'text'})])}
    ${radioGroup('income_status','收支情形',['良好','尚可','收支失衡'])}
  </div>
  <div class="card">
    ${textareaField('concern_worries','對於孩童最擔心的問題為')}
    ${textareaField('concern_expectation','對於評估或療育的期待')}
    ${checkboxGroup('concern_help_needed','本次就診希望獲得的協助',['藥物治療','親職諮商','家族治療','心理治療','就學/就業諮詢', opt('其他',{name:'concern_help_other',type:'text'})])}
  </div>`
});

// ---------- Step 3：個案基本資料 ----------
steps.push({
  title: "個案基本資料",
  desc: "請填寫接受評估孩子的資料；若有2名以上的孩子，請每位孩子分別填寫一次",
  html: `
  <div class="card">
    <div class="row-2">
      ${textField('child_name','個案姓名',{required:true})}
      ${textField('child_dob','出生日期',{type:'date',required:true})}
    </div>
    ${radioGroup('child_hand','慣用手',['右手','左手','尚未發展'])}
    <div class="field">
      <span class="field-label">居住地址</span>
      <div class="inline-fields">
        <input type="text" class="mini" name="addr_city" placeholder="市/縣">
        <input type="text" class="mini" name="addr_district" placeholder="區">
        <input type="text" class="mini" name="addr_road" placeholder="路/街">
        <input type="text" class="mini" name="addr_section" placeholder="段">
        <input type="text" class="mini" name="addr_lane" placeholder="巷">
        <input type="text" class="mini" name="addr_alley" placeholder="弄">
        <input type="text" class="mini" name="addr_number" placeholder="號">
        <input type="text" class="mini" name="addr_floor" placeholder="樓">
      </div>
    </div>
  </div>
  <div class="card">
    ${checkboxGroup('family_members','家中成員',['父','母', opt('兄',{name:'family_brother_count',type:'number',placeholder:'人數'}), opt('弟',{name:'family_younger_brother_count',type:'number',placeholder:'人數'}), opt('姊',{name:'family_sister_count',type:'number',placeholder:'人數'}), opt('妹',{name:'family_younger_sister_count',type:'number',placeholder:'人數'}), '外公','外婆','爺爺','奶奶', opt('其他',{name:'family_other_count',type:'number',placeholder:'人數'})])}
    ${radioGroup('sibling_delay','手足有無發展遲緩相關問題',['無', opt('有',{name:'sibling_delay_detail',type:'text',placeholder:'請說明'})])}
    <div class="field">
      <span class="field-label">目前主要照顧者 <span class="field-hint">（若為同一人，時段可留白）</span></span>
      <div class="subcard">
        <div class="inline-fields"><b style="font-size:13px;width:40px;">白天</b><input type="text" class="mini" name="caregiver_day" placeholder="照顧者"><input type="text" class="mini" name="caregiver_day_time" placeholder="時段，如 8:00~18:00"></div>
        <div class="inline-fields" style="margin-top:8px;"><b style="font-size:13px;width:40px;">晚上</b><input type="text" class="mini" name="caregiver_night" placeholder="照顧者"><input type="text" class="mini" name="caregiver_night_time" placeholder="時段"></div>
        <div class="inline-fields" style="margin-top:8px;"><b style="font-size:13px;width:40px;">週末</b><input type="text" class="mini" name="caregiver_weekend" placeholder="照顧者"><input type="text" class="mini" name="caregiver_weekend_time" placeholder="時段"></div>
      </div>
    </div>
  </div>`
});

// ---------- Step 4：懷孕生產史與疾病史 ----------
steps.push({
  title: "懷孕生產史 · 疾病史",
  desc: "",
  html: `
  <div class="card">
    <div class="subcard-title" style="margin-bottom:14px;">母親懷孕時</div>
    ${textField('pregnancy_mother_age','懷孕時年齡',{type:'number',placeholder:'歲'})}

/* =========================================================
   渲染與換頁邏輯
   ========================================================= */
const stepsContainer = document.getElementById('steps');
steps.forEach((s,i)=>{
  const div = document.createElement('div');
  div.className = 'step' + (i===0 ? ' active' : '');
  div.dataset.index = i;
  div.innerHTML = `<div class="step-title">${s.title}</div>${s.desc?`<div class="step-desc">${s.desc}</div>`:''}${s.html}`;
  stepsContainer.appendChild(div);
});

let current = 0;
const total = steps.length;
const progressBar = document.getElementById('progress-bar');
const stepCounter = document.getElementById('step-counter');
const sectionSub = document.getElementById('section-title-sub');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnSubmit = document.getElementById('btn-submit');
const doneScreen = document.getElementById('done-screen');
const mainForm = document.getElementById('mainForm');

function render(){
  document.querySelectorAll('.step').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  progressBar.style.width = `${(current/(total-1))*100}%`;
  stepCounter.textContent = `第 ${current+1} / ${total} 節`;
  sectionSub.textContent = steps[current].title;
  btnPrev.disabled = current===0;
  btnNext.style.display = current===total-1 ? 'none' : 'inline-block';
  btnSubmit.style.display = current===total-1 ? 'inline-block' : 'none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function clearFieldErrors(stepEl){
  stepEl.querySelectorAll('.field.field-error').forEach(f=>f.classList.remove('field-error'));
}

function validateStep(stepIndex){
  const stepEl = document.querySelector(`.step[data-index="${stepIndex}"]`);
  if(!stepEl) return true;
  clearFieldErrors(stepEl);

  let firstErrorEl = null;
  const checkedRadioNames = new Set();

  // 一般必填欄位（文字/日期/數字/單選）
  const requiredInputs = stepEl.querySelectorAll('[required]');
  for(const inp of requiredInputs){
    const field = inp.closest('.field');
    if(inp.type === 'radio'){
      if(checkedRadioNames.has(inp.name)) continue;
      checkedRadioNames.add(inp.name);
      const anyChecked = stepEl.querySelector(`input[name="${inp.name}"]:checked`);
      if(!anyChecked){
        if(field) field.classList.add('field-error');
        if(!firstErrorEl) firstErrorEl = field || inp;
      }
    } else {
      if(!inp.value){
        if(field) field.classList.add('field-error');
        if(!firstErrorEl) firstErrorEl = field || inp;
      }
    }
  }

  // 複選題「至少勾選一項」必填
  const requiredCheckboxGroups = stepEl.querySelectorAll('[data-required-group]');
  requiredCheckboxGroups.forEach(field=>{
    const name = field.getAttribute('data-required-group');
    const anyChecked = stepEl.querySelector(`input[name="${name}"]:checked`);
    if(!anyChecked){
      field.classList.add('field-error');
      if(!firstErrorEl) firstErrorEl = field;
    }
  });

  if(firstErrorEl){
    firstErrorEl.scrollIntoView({behavior:'smooth', block:'center'});
    return false;
  }
  return true;
}

btnPrev.addEventListener('click', ()=>{ if(current>0){ current--; render(); } });
btnNext.addEventListener('click', ()=>{
  if(current===0){ current++; render(); return; }
  if(!validateStep(current)) return;
  if(current<total-1){ current++; render(); }
});

btnSubmit.addEventListener('click', async ()=>{
  if(!validateStep(current)) return;
  btnSubmit.disabled = true;
  btnSubmit.textContent = '送出中...';
  const formData = new FormData(mainForm);
  try{
    if(GAS_WEB_APP_URL && !GAS_WEB_APP_URL.includes('PASTE_YOUR')){
      await fetch(GAS_WEB_APP_URL, { method:'POST', body: formData, mode:'no-cors' });
    }
    document.getElementById('topbar').style.display='none';
    document.getElementById('dev-banner').style.display='none';
    mainForm.style.display='none';
    document.getElementById('navbar').style.display='none';
    doneScreen.style.display='block';
  }catch(err){
    alert('送出時發生問題，請確認網路連線後再試一次。');
    btnSubmit.disabled = false;
    btnSubmit.textContent = '送出表單';
  }
});

if(GAS_WEB_APP_URL.includes('PASTE_YOUR')){
  document.getElementById('dev-banner').style.display='block';
} else {
  document.getElementById('dev-banner').style.display='none';
}

render();
</script>
